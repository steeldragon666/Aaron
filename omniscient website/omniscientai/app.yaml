runtime: nodejs20
instance_class: F1
env: standard
automatic_scaling:
  max_instances: 10

handlers:
  - url: /.*
    script: auto
    secure: always

env_variables:
  NODE_ENV: "production"
  # Set these in the Google Cloud Console or add them here (not recommended for secrets)
  DATABASE_URL: "mysql://user:pass@host:3306/db"
  JWT_SECRET: "your-jwt-secret"
  VITE_APP_ID: "your-app-id"
  OAUTH_SERVER_URL: "your-oauth-server"
  OWNER_OPEN_ID: "your-open-id"
  BUILT_IN_FORGE_API_URL: "your-forge-api"
  BUILT_IN_FORGE_API_KEY: "your-forge-key"
  # DATABASE_URL will need to be set in the Google Cloud Console Secret Manager
  # or directly in the app.yaml for testing (not recommended for secrets)
