# Cloud Build config for omniscientai-service (Cloud Run).
#
# Target registry: Artifact Registry in australia-southeast1. The repo
# "omniscientai-repo" and image "web-app" already exist and are what
# the live Cloud Run service pulls from. We push a new tag per build,
# plus update :latest for easier reference.
#
# Default: dark-deploys v2 code with VITE_USE_V2=false. Override via:
#   gcloud builds submit --substitutions=_VITE_USE_V2=true --config=cloudbuild.yaml .
#
# After the build succeeds, roll the new image out to Cloud Run with:
#   gcloud run deploy omniscientai-service \
#     --image=australia-southeast1-docker.pkg.dev/omniscientai-website/omniscientai-repo/web-app:$BUILD_ID \
#     --project=omniscientai-website \
#     --region=australia-southeast1 \
#     --allow-unauthenticated

substitutions:
  _VITE_USE_V2: 'false'
  _REGION: 'australia-southeast1'
  _REPO: 'omniscientai-repo'
  _IMAGE: 'web-app'

steps:
  - name: gcr.io/cloud-builders/docker
    args:
      - build
      - --build-arg
      - VITE_USE_V2=${_VITE_USE_V2}
      - -t
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/${_IMAGE}:$BUILD_ID
      - -t
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/${_IMAGE}:latest
      - .

  - name: gcr.io/cloud-builders/docker
    args: [push, '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/${_IMAGE}:$BUILD_ID']

  - name: gcr.io/cloud-builders/docker
    args: [push, '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/${_IMAGE}:latest']

images:
  - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/${_IMAGE}:$BUILD_ID
  - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/${_IMAGE}:latest

options:
  logging: CLOUD_LOGGING_ONLY
